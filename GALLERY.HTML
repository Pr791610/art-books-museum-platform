<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Gallery</title>

<style>
body{margin:0;background:#0a0a10;color:white;font-family:Arial}

header{
text-align:center;
padding:20px;
border-bottom:1px solid #222;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:10px;
padding:10px;
}

.card{
border:1px solid #222;
border-radius:10px;
overflow:hidden;
background:#151520;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
display:block;
}
</style>
</head>

<body>

<header>
<h2>ARTWORK COLLECTION</h2>
</header>

<div class="grid" id="grid"></div>

<script>
const TOTAL = 312; // real count from ZIP
const grid = document.getElementById("grid");

for(let i=1;i<=TOTAL;i++){
let id = String(i).padStart(3,"0");

grid.innerHTML += `
<div class="card">
<img src="coupons/${id}.jpg">
</div>`;
}
</script>

</body>
</html>
